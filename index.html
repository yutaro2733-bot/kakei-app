<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>家計アプリ</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input[type="number"] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    margin-top: 5px;
    box-sizing: border-box;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
}

button:active {
    background: #3e8e41;
}

#result {
    font-size: 16px;
    line-height: 1.6;
}
</style>
</head>

<body>

<h2>家計アプリ</h2>

<div class="card">
残高
<input id="income" type="number">
</div>

<div class="card">
<h3>固定費（変更可能）</h3>

家賃
<input type="number" id="rent" value="56000">

散髪
<input type="number" id="haircut" value="5000">

光熱費
<input type="number" id="utility" value="7000">

定期代
<input type="number" id="train" value="6400">
</div>

<div class="card">
追加の必要経費
<input id="extra" type="number" value="0">
</div>

<div class="card">
累計貯金額
<input id="saving" type="number" value="0">
</div>

<div class="card">
残り週数
<input id="weeks" type="number" value="4">
</div>

<button onclick="calc()">計算する</button>

<div class="card" id="result"></div>

<script>
function saveData() {
    let data = {
        income: document.getElementById("income").value,
        rent: document.getElementById("rent").value,
        haircut: document.getElementById("haircut").value,
        utility: document.getElementById("utility").value,
        train: document.getElementById("train").value,
        extra: document.getElementById("extra").value,
        saving: document.getElementById("saving").value,
        weeks: document.getElementById("weeks").value
    };

    localStorage.setItem("kakeiData", JSON.stringify(data));
}

function loadData() {
    let data = localStorage.getItem("kakeiData");
    if (!data) return;

    data = JSON.parse(data);

    document.getElementById("income").value = data.income || "";
    document.getElementById("rent").value = data.rent || 56000;
    document.getElementById("haircut").value = data.haircut || 5000;
    document.getElementById("utility").value = data.utility || 7000;
    document.getElementById("train").value = data.train || 6400;
    document.getElementById("extra").value = data.extra || 0;
    document.getElementById("saving").value = data.saving || 0;
    document.getElementById("weeks").value = data.weeks || 4;
}

function calc() {
    let income = Number(document.getElementById("income").value);

    let rent = Number(document.getElementById("rent").value);
    let haircut = Number(document.getElementById("haircut").value);
    let utility = Number(document.getElementById("utility").value);
    let train = Number(document.getElementById("train").value);

    let extra = Number(document.getElementById("extra").value);
    let saving = Number(document.getElementById("saving").value);
    let weeks = Number(document.getElementById("weeks").value);

    let fixed = rent + haircut + utility + train;

    let available = income - fixed - extra - saving;
    let weekly = available - (weeks * 5000);

    document.getElementById("result").innerHTML =
        "必要経費合計: " + (fixed + extra) + "円<br>" +
        "累計貯金: " + saving + "円<br>" +
        "自由に使えるお金: " + available + "円<br>" +
        "週5000円生活後: " + weekly + "円";

    saveData();
}

window.onload = loadData;
</script>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
