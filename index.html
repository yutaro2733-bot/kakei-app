<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>家計アプリ</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">

<style>
body {
    font-family: sans-serif;
    margin: 0;
    padding: 15px;
    background: #f5f5f5;
}

h2 {
    text-align: center;
}

.card {
    background: white;
    padding: 15px;
    margin-bottom: 15px;
    border-radius: 12px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input[type="number"] {
    width: 100%;
    padding: 10px;
    font-size: 16px;
    margin-top: 5px;
    box-sizing: border-box;
}

label {
    display: block;
    margin: 8px 0;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    font-size: 18px;
    background: #4CAF50;
    color: white;
    border: none;
    border-radius: 10px;
}

button:active {
    background: #3e8e41;
}

#result {
    font-size: 16px;
    line-height: 1.6;
}
</style>
</head>

<body>

<h2>家計アプリ</h2>

<div class="card">
残高
<input id="income" type="number">
</div>

<div class="card">
<h3>固定費（支払い済みならチェック）</h3>

<label><input type="checkbox" id="rent"> 家賃（56429）</label>
<label><input type="checkbox" id="haircut"> 散髪（5000）</label>
<label><input type="checkbox" id="utility"> 光熱費（7000）</label>
<label><input type="checkbox" id="train"> 定期代（6400）</label>
</div>

<div class="card">
追加の必要経費
<input id="extra" type="number" value="0">
</div>

<div class="card">
累積貯金額
<input id="saving" type="number" value="0">
</div>

<div class="card">
残り週数
<input id="weeks" type="number" value="4">
</div>

<button onclick="calc()">計算する</button>

<div class="card" id="result"></div>

<script>
function calc() {
    let income = Number(document.getElementById("income").value);

    let fixed = 0;

    if (!document.getElementById("rent").checked) fixed += 56000;
    if (!document.getElementById("haircut").checked) fixed += 5000;
    if (!document.getElementById("utility").checked) fixed += 7000;
    if (!document.getElementById("train").checked) fixed += 6400;

    let extra = Number(document.getElementById("extra").value);
    let saving = Number(document.getElementById("saving").value);
    let weeks = Number(document.getElementById("weeks").value);

    let available = income - fixed - extra - saving;
    let weekly = available - (weeks * 5000);

    document.getElementById("result").innerHTML =
        "必要経費合計: " + (fixed + extra) + "円<br>" +
        "累積貯金: " + saving + "円<br>" +
        "自由に使えるお金: " + available + "円<br>" +
        "週5000円生活後の残り: " + weekly + "円";
}
</script>

<!-- Service Worker（オフライン化） -->
<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("sw.js");
}
</script>

</body>
</html>
